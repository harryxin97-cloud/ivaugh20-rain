name: Capture IVAUGH20 Rain

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional date YYYY-MM-DD"
        required: false
        type: string
  schedule:
    - cron: "15 6,8 * * *"

permissions:
  contents: write

concurrency:
  group: ivaugh20-rain-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install packages
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture scheduled precipitation
        if: ${{ github.event_name == 'schedule' }}
        run: npm run scrape

      - name: Capture manual precipitation
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TARGET_DATE: ${{ inputs.target_date }}
        run: npm run scrape

      - name: Verify generated files
        run: |
          test -s data/history.json
          test -s data/latest.json

      - name: Save result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/history.json data/latest.json

          if git diff --cached --quiet; then
            echo "::error::Scrape finished but no data files changed."
            exit 1
          fi

          git commit -m "Update IVAUGH20 precipitation"
          git push
